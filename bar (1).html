<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PRAKHAR DDOS - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      height: 100dvh; /* For mobile address bars */
      overflow: hidden;
    }

    /* Main App Wrapper */
    .app-container {
      width: 100%;
      max-width: 420px;
      height: 100%;
      max-height: 900px;
      background-color: #0d0d0d;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top Banner */
    .top-banner {
      background-color: #000;
      color: #fff;
      text-align: center;
      font-size: 11px;
      font-weight: 800;
      padding: 10px 0;
      letter-spacing: 0.5px;
      z-index: 50;
      flex-shrink: 0;
    }

    /* Scrollable Area - Handles the Slide Up Effect */
    .scroll-area {
      flex-grow: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
      scrollbar-width: none; /* Firefox */
      position: relative;
    }
    .scroll-area::-webkit-scrollbar { display: none; } /* Safari/Chrome */

    /* 1. Header Section (Dark) */
    .header-section {
      height: 65vh; /* Takes up 65% of screen initially */
      min-height: 450px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 5vh;
      scroll-snap-align: start; /* Snaps here */
      z-index: 10;
    }

    .logo-svg {
      width: 150px;
      height: 150px;
      margin-bottom: 15px;
    }

    .brand-title {
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    .features-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .feature-icon {
      width: 20px;
      height: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 2. Bottom Sheet Section (Light Grey Form) */
    .bottom-sheet {
      background-color: #d9d9d9;
      min-height: 100vh; /* Fills screen when scrolled up */
      border-top-left-radius: 40px;
      border-top-right-radius: 40px;
      margin-top: -10vh; /* Overlaps the header slightly */
      padding: 0 25px 40px 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      scroll-snap-align: start; /* Snaps here for full screen form */
      box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
      position: relative;
      z-index: 20;
    }

    /* Little visual pill to indicate swipe up */
    .swipe-indicator {
      width: 40px;
      height: 5px;
      background-color: #999;
      border-radius: 5px;
      margin: 15px 0 25px 0;
      opacity: 0.6;
    }

    .welcome-text {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      color: #000;
      line-height: 1.4;
      margin-bottom: 15px;
    }

    .welcome-text svg {
      width: 24px;
      height: 24px;
      vertical-align: text-bottom;
      margin: 0 2px;
    }

    .text-red { color: #ff0606; }

    .divider {
      width: 100%;
      height: 1px;
      background-color: #aaa;
      margin: 20px 0 35px 0;
    }

    /* Input Forms */
    .input-wrapper {
      width: 100%;
      position: relative;
      margin-bottom: 20px;
    }

    .input-field {
      width: 100%;
      background: #575757;
      border: none;
      border-radius: 12px;
      padding: 18px 20px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      outline: none;
      transition: background 0.3s;
    }

    .input-field::placeholder { color: rgba(255, 255, 255, 0.6); }

    .input-field.error {
      background: #ff4444;
      animation: shake 0.5s;
    }

    .info-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
    }

    .instruction-text {
      color: #ca0000;
      font-size: 11px;
      font-weight: 800;
      margin: -5px 0 30px 0;
      text-align: center;
    }

    /* Actions Bottom Area */
    .actions-container {
      width: 100%;
      margin-top: 40px; /* Pushes everything down below the fold */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .enter-btn {
      background: #6eff14;
      color: #fff;
      border: none;
      font-size: 24px;
      font-weight: 800;
      padding: 20px;
      cursor: pointer;
      transition: background 0.3s, transform 0.1s;
      margin-bottom: 25px;
      
      /* Mobile styling: full width, no edges */
      width: calc(100% + 50px); /* Overcomes the 25px padding on left/right */
      margin-left: -25px;
      margin-right: -25px;
      border-radius: 0;
    }

    .enter-btn:hover { background: #5ee000; }
    .enter-btn:active { transform: scale(0.98); }

    .or-text {
      font-size: 14px;
      font-weight: 800;
      color: #000;
      margin-bottom: 20px;
    }

    .secondary-actions {
      display: flex;
      width: 100%;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    .tg-btn {
      width: 70px;
      height: 50px;
      background: #008cff;
      border: none;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .tg-btn svg { width: 30px; height: 30px; }

    .gen-btn {
      flex-grow: 1;
      height: 50px;
      background: #008cff;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    /* Desktop Responsive Overrides */
    @media (min-width: 421px) {
      .app-container {
        border-radius: 20px;
        box-shadow: 0 0 40px rgba(0,0,0,0.8);
      }
      .scroll-area {
        scroll-snap-type: none; /* Disable snapping on desktop */
      }
      .header-section {
        height: auto;
        min-height: auto;
        padding-bottom: 50px;
      }
      .bottom-sheet {
        min-height: auto;
        margin-top: 0;
        flex-grow: 1;
        box-shadow: none;
      }
      .swipe-indicator { display: none; } /* Hide swipe indicator on desktop */
      .enter-btn {
        width: 100%;
        margin-left: 0;
        margin-right: 0;
        border-radius: 15px; /* Restore edges on desktop */
      }
      .actions-container {
        margin-top: auto; /* Just push to bottom of remaining space */
      }
    }

    /* Success Message */
    .success-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background: rgba(110, 255, 20, 0.95);
      padding: 25px 40px;
      border-radius: 20px;
      font-size: 22px;
      font-weight: 800;
      color: #000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
      text-align: center;
      white-space: nowrap;
    }

    .success-msg.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
  </style>
</head>

  <script>
    // Valid credentials setup
    const VALID_CREDENTIALS = {
      username: 'admin',
      passcode: '12345'
    };

    // Auto-scroll sheet to full screen when user clicks an input field
    document.querySelectorAll('.input-field').forEach(input => {
      input.addEventListener('focus', () => {
        if(window.innerWidth <= 420) {
          document.getElementById('bottomSheet').scrollIntoView({ behavior: 'smooth' });
        }
      });
    });

    function handleLogin() {
      const usernameInput = document.getElementById('username');
      const passcodeInput = document.getElementById('passcode');
      const username = usernameInput.value.trim();
      const passcode = passcodeInput.value.trim();
      
      usernameInput.classList.remove('error');
      passcodeInput.classList.remove('error');

      if (!username || !passcode) {
        if (!username) usernameInput.classList.add('error');
        if (!passcode) passcodeInput.classList.add('error');
        
        setTimeout(() => {
          usernameInput.classList.remove('error');
          passcodeInput.classList.remove('error');
        }, 500);
        return;
      }

      // Check validation
      if (username === VALID_CREDENTIALS.username && passcode === VALID_CREDENTIALS.passcode) {
        const successMsg = document.getElementById('successMessage');
        successMsg.classList.add('show');
        
        usernameInput.value = '';
        passcodeInput.value = '';
        
        setTimeout(() => {
          successMsg.classList.remove('show');
        }, 3000);
      } else {
        usernameInput.classList.add('error');
        passcodeInput.classList.add('error');
        
        setTimeout(() => {
          usernameInput.classList.remove('error');
          passcodeInput.classList.remove('error');
        }, 500);
      }
    }

    function generatePasscode() {
      const characters = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; 
      let passcode = '';
      for (let i = 0; i < 8; i++) {
        passcode += characters.charAt(Math.floor(Math.random() * characters.length));
      }
      
      const passcodeField = document.getElementById('passcode');
      passcodeField.value = passcode;
      
      passcodeField.style.background = '#4CAF50';
      setTimeout(() => {
        passcodeField.style.background = '#575757';
      }, 300);
    }

    function openTelegram() {
      window.open('https://t.me/', '_blank');
    }

    document.querySelectorAll('.input-field').forEach(input => {
      input.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') handleLogin();
      });
    });
  </script>
